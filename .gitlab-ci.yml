workflow:
  rules:
  - if: $CI_COMMIT_BRANCH

stages:
- test

molecule test:
  image: python:3.10
  stage: test
  before_script:
  - apt update
  - podman info
  - python3 --version
  - python3 -m pip install ansible molecule[podman] yamllint
  - ansible --version
  - molecule --version
  script:
  - make test
  rules:
  - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
