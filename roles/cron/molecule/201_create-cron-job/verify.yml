---
- name: 'verify'
  hosts: 'all'
  gather_facts: false

  tasks:
  - name: 'assert that the t_cronjob_001 is present'
    ansible.builtin.cron:
      name: 't_cronjob_001'
      job: '/usr/bin/true'
      user: 'root'
      state: 'present'
  - name: 'assert that the t_cronjob_002 is present'
    ansible.builtin.cron:
      name: 't_cronjob_002'
      job: '/usr/bin/true'
      user: 'root'
      state: 'present'
  - name: 'assert that the t_cronjob_003 is present'
    ansible.builtin.cron:
      name: 't_cronjob_003'
      job: '/usr/bin/true'
      user: 'nobody'
      day: '1'
      hour: '22'
      minute: '30'
      month: '6'
      weekday: '3'
      state: 'present'
  - name: 'assert that the t_cronjob_004 is present'
    ansible.builtin.cron:
      name: 't_cronjob_004'
      job: '/usr/bin/true'
      user: 'root'
      cron_file: '/etc/cron.d/t_cronjob_004'
      state: 'present'
