---
- name: 'linux | mount | create, update, or delete mount point'
  ansible.posix.mount:
    name: '{{ item.name | mandatory }}'
    src: '{{ item.src | d(omit) }}'
    boot: '{{ item.boot | d(omit) }}'
    fstype: '{{ item.fstype | d(omit) }}'
    opts: '{{ item.opts | d(omit) }}'
    state: '{{ item.state | d("mounted") }}'
  loop: '{{ linux_mount }}'
