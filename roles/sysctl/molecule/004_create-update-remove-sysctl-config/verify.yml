---
- name: "verify"
  hosts: "all"
  gather_facts: false

  tasks:
  - name: "assert that the vm.swappiness is present"
    ansible.posix.sysctl:
      name: "vm.swappiness"
      value: "10"
      reload: "no"
      state: "present"
    changed_when: false
  - name: "assert that the kernel.panic is present"
    ansible.posix.sysctl:
      name: "kernel.panic"
      value: "0"
      reload: "no"
      state: "present"
    changed_when: false
  - name: "assert that the net.ipv4.ip_forward is absent"
    ansible.posix.sysctl:
      name: "net.ipv4.ip_forward"
      value: "1"
      reload: "no"
      state: "absent"
    changed_when: false
