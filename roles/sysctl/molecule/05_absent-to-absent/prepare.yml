---
- name: "prepare"
  hosts: "all"

  tasks:
  - name: "install required package"
    ansible.builtin.package:
      name: "procps"
      state: "present"
  - name: "prepare sysctl config state absent -> absent"
    ansible.posix.sysctl:
      name: "vm.swappiness"
      state: "absent"
      reload: "no"
