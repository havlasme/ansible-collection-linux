---
- name: "verify"
  hosts: "all"
  gather_facts: false

  tasks:
  - name: "assert that the test_group_001 is present"
    ansible.builtin.group:
      name: "test_group_001"
      state: "present"
    changed_when: false
  - name: "assert that the test_group_002 is present"
    ansible.builtin.group:
      name: "test_group_002"
      state: "present"
    changed_when: false
  - name: "assert that the test_group_003 is present"
    ansible.builtin.group:
      name: "test_group_003"
      system: "yes"
      state: "present"
    changed_when: false
